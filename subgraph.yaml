specVersion: 0.0.1
description: Defi Energy Supply. v0.0.1
repository: https://github.com/b0gdaniy/defi-energy-supply-subgraph
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: Register
    network: arbitrum-sepolia
    source:
      address: "0xf646325Eb8E44Ed8Dfc07074ea1667455521C4f7"
      abi: Register
      startBlock: 53651286
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mappings/register.ts
      entities:
        - Supplier
        - User
      abis:
        - name: Register
          file: ./abis/Register.json
      eventHandlers:
        - event: SupplierRegistered(indexed address,indexed address,indexed uint256,uint256,uint256)
          handler: handleSupplierRegistered
        - event: SupplierUnregistered(indexed address,indexed address,indexed uint256,uint256)
          handler: handleSupplierUnregistered
        - event: UserRegistered(indexed address,indexed address,indexed uint256,uint256)
          handler: handleUserRegistered
        - event: UserUnregistered(indexed address,indexed address,indexed uint256,uint256)
          handler: handleUserUnregistered
  - kind: ethereum/contract
    name: EnergyOracle
    network: arbitrum-sepolia
    source:
      address: "0x22Ab3c7Bc02695D3B119A6cf0224f00354E2Ee7f"
      abi: EnergyOracle
      startBlock: 53651279
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mappings/energy-oracle.ts
      entities:
        - EnergyConsumption
      abis:
        - name: EnergyOracle
          file: ./abis/EnergyOracle.json
      eventHandlers:
        - event: EnergyConsumptionRecorded(indexed address,indexed address,indexed uint256,uint256,uint256)
          handler: handleEnergyConsumptionRecorded
        - event: EnergyConsumptionPaid(indexed address,indexed address,indexed uint256,uint256)
          handler: handleEnergyConsumptionSent
