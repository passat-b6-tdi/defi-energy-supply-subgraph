specVersion: 0.0.4
description: Defi Energy Supply. v0.0.1
repository: https://github.com/b0gdaniy/defi-energy-supply-subgraph
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: Register
    network: arbitrum-sepolia
    source:
      address: "0x92aC6a4d4D3ddFb7eA2B32847D6Cf89FAF4F948b"
      abi: Register
      startBlock: 51631110
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mappings/register.ts
      entities:
        - Supplier
        - User
      abis:
        - name: Register
          file: ./abis/Register.json
      eventHandlers:
        - event: SupplierRegistered(indexed address,indexed address,uint256)
          handler: handleSupplierRegistered
        - event: SupplierUnregistered(indexed address,indexed address,uint256)
          handler: handleSupplierUnregistered
        - event: UserRegistered(indexed address,indexed address,uint256)
          handler: handleUserRegistered
        - event: UserUnregistered(indexed address,indexed address,uint256)
          handler: handleUserUnregistered
  - kind: ethereum/contract
    name: EnergyOracle
    network: arbitrum-sepolia
    source:
      address: "0x1888C7F3fF23793ea0B462D319D9DF122f67f6b4"
      abi: EnergyOracle
      startBlock: 51631104
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mappings/energy-oracle.ts
      entities:
        - EnergyConsumption
      abis:
        - name: EnergyOracle
          file: ./abis/EnergyOracle.json
      eventHandlers:
        - event: EnergyConsumptionRecorded(indexed address,indexed address,indexed
            uint256,uint256,uint256)
          handler: handleEnergyConsumptionRecorded
        - event: EnergyConsumptionSent(indexed address,indexed address,indexed
            uint256,uint256,uint256)
          handler: handleEnergyConsumptionSent
