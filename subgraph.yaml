specVersion: 0.0.4
description: Defi Energy Supply. v0.0.1
repository: https://github.com/b0gdaniy/defi-energy-supply-subgraph
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: Register
    network: arbitrum-sepolia
    source:
      address: "0xf90f06AfD2AE7EDA5a7189aA5b40329b4EF50faf"
      abi: Register
      startBlock: 56554557
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mappings/register.ts
      entities:
        - Supplier
        - User
      abis:
        - name: Register
          file: ./abis/Register.json
      eventHandlers:
        - event: SupplierRegistered(indexed address,indexed address,indexed uint256,uint256)
          handler: handleSupplierRegistered
        - event: SupplierUnregistered(indexed address,indexed address,indexed uint256,uint256)
          handler: handleSupplierUnregistered
        - event: ConsumerRegistered(indexed address,indexed address,indexed uint256,address,uint256)
          handler: handleUserRegistered
        - event: ConsumerUnregistered(indexed address,indexed address,indexed uint256,address,uint256)
          handler: handleUserUnregistered
  - kind: ethereum/contract
    name: EnergyOracle
    network: arbitrum-sepolia
    source:
      address: "0x5BE42a225cde40dc79Bf07DE6898877DCae670fd"
      abi: EnergyOracle
      startBlock: 56554551
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mappings/energy-oracle.ts
      entities:
        - EnergyProduction
        - EnergyConsumption
      abis:
        - name: EnergyOracle
          file: ./abis/EnergyOracle.json
      eventHandlers:
        - event: EnergyConsumptionRecorded(indexed address,indexed address,indexed uint256,uint256,uint256)
          handler: handleEnergyConsumptionRecorded
        - event: EnergyConsumptionPaid(indexed address,indexed address,indexed uint256,uint256)
          handler: handleEnergyConsumptionSent
        - event: EnergyProductionRecorded(indexed address,indexed address,indexed uint256,uint256,uint256)
          handler: handleEnergyProductionRecorded
