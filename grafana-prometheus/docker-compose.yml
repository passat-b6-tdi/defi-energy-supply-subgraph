version: "3"
networks:
  monitoring-network:
    external: true

services:
  prometheus:
    build:
      context: .
      dockerfile: Dockerfile-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring-network

  python-script:
    build:
      context: .
      dockerfile: Dockerfile-python
    volumes:
      - ./prometheus/prometheus.py:/app/prometheus.py
    ports:
      - "8000:8000"
    depends_on:
      - prometheus
    networks:
      - monitoring-network

  grafana:
    build:
      context: .
      dockerfile: Dockerfile-grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring-network
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}

volumes:
  grafana-data:
