type UserRegistered @entity(immutable: true) {
  id: Bytes!
  sender: Bytes! # address
  user: Bytes! # address
  timestamp: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type UserUnregistered @entity(immutable: true) {
  id: Bytes!
  sender: Bytes! # address
  user: Bytes! # address
  timestamp: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
