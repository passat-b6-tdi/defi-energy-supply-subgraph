type Supplier @entity(immutable: false) {
  id: ID! # Unique Identifier (Supplier Id)
  supplierId: BigInt! # SuplierId
  supplierAddress: Bytes! # Supplier's Address
  consumers: [Consumer!]! @derivedFrom(field: "supplier") # Supplier's Consumers
  energyProduction: EnergyProduction! @derivedFrom(field: "supplier") # Supplier's Production
}
